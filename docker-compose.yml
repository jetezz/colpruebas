services:
  frontend-prod:
    container_name: colpruebas-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - PUBLIC_ENVIRONMENT=${ENVIRONMENT}
    ports:
      - "${FRONTEND_PORT}:4321"
    environment:
      - NODE_ENV=${NODE_ENV}
      - APP_NAME=${APP_NAME}
      - PUBLIC_ENVIRONMENT=${ENVIRONMENT}
      - API_URL=http://colpruebas-api-prod:3000
    depends_on:
      - api-prod
    networks:
      - internal
    restart: unless-stopped

  api-prod:
    container_name: colpruebas-api-prod
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "${API_PORT}:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - APP_NAME=${APP_NAME}
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=3000
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    name: colpruebas-prod-internal
