services:
  # ═══════════════════════════════════════════════════════════════════════
  # PRODUCTION SERVICES
  # ═══════════════════════════════════════════════════════════════════════

  frontend-prod:
    container_name: colpruebas-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-8085}:4321"
    environment:
      - NODE_ENV=production
      - APP_NAME=colpruebas
      - ENVIRONMENT=production
      - API_URL=http://api-prod:3000
      - GIT_BRANCH=${GIT_BRANCH:-main}
    depends_on:
      - api-prod
    networks:
      - internal
    restart: unless-stopped

  api-prod:
    container_name: colpruebas-api-prod
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3005}:3000"
    environment:
      - NODE_ENV=production
      - APP_NAME=colpruebas
      - ENVIRONMENT=production
      - PORT=3000
      - GIT_BRANCH=${GIT_BRANCH:-main}
    networks:
      - internal
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════
  # TEST SERVICES
  # ═══════════════════════════════════════════════════════════════════════

  frontend-test:
    container_name: colpruebas-frontend-test
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_TEST_PORT:-8086}:4321"
    environment:
      - NODE_ENV=test
      - APP_NAME=colpruebas
      - ENVIRONMENT=test
      - API_URL=http://api-test:3000
      - GIT_BRANCH=${GIT_BRANCH:-main}
    depends_on:
      - api-test
    networks:
      - internal
    restart: unless-stopped

  api-test:
    container_name: colpruebas-api-test
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_TEST_PORT:-3006}:3000"
    environment:
      - NODE_ENV=test
      - APP_NAME=colpruebas
      - ENVIRONMENT=test
      - PORT=3000
      - GIT_BRANCH=${GIT_BRANCH:-main}
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
