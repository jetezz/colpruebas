services:
  frontend-prod:
    container_name: colpruebas-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - PUBLIC_ENVIRONMENT=${ENVIRONMENT}
        - PUBLIC_API_URL=${PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT}:4321"
    environment:
      - NODE_ENV=${NODE_ENV}
      - APP_NAME=${APP_NAME}
      - PUBLIC_ENVIRONMENT=${ENVIRONMENT}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
    depends_on:
      - api-prod
    networks:
      internal:
      edge:
        aliases:
          - colpruebas-origin
    restart: unless-stopped

  api-prod:
    container_name: colpruebas-api-prod
    build:
      context: .
      dockerfile: ./backend/Dockerfile.prod
    ports:
      - "${API_PORT}:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - APP_NAME=${APP_NAME}
      - ENVIRONMENT=${ENVIRONMENT}
      - PORT=3000
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    name: colpruebas-prod-internal
  edge:
    external: true
    name: mis-proyectos-edge
