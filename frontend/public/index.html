<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>colpruebas</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        max-width: 600px;
        width: 100%;
      }
      h1 {
        color: #333;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .info-card {
        background: #f8f9fa;
        padding: 1.5rem;
        border-radius: 8px;
        margin-bottom: 1rem;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        padding: 0.75rem 0;
        border-bottom: 1px solid #e9ecef;
      }
      .info-row:last-child {
        border-bottom: none;
      }
      .label {
        font-weight: 600;
        color: #495057;
      }
      .value {
        color: #667eea;
        font-weight: 500;
      }
      .value.prod {
        color: #28a745;
      }
      .value.test {
        color: #ffc107;
      }
      .status {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        font-size: 0.875rem;
        font-weight: 500;
      }
      .status.prod {
        background: #d4edda;
        color: #155724;
      }
      .status.test {
        background: #fff3cd;
        color: #856404;
      }
      .loading {
        text-align: center;
        color: #6c757d;
        padding: 2rem;
      }
      .timestamp {
        text-align: center;
        color: #6c757d;
        font-size: 0.875rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🚀 colpruebas</h1>
      
      <div class="info-card">
        <div class="info-row">
          <span class="label">Aplicación:</span>
          <span class="value" id="appName">-</span>
        </div>
        <div class="info-row">
          <span class="label">Entorno:</span>
          <span class="value" id="environment">-</span>
        </div>
        <div class="info-row">
          <span class="label">Frontend:</span>
          <span class="value" id="frontendStatus">-</span>
        </div>
        <div class="info-row">
          <span class="label">API:</span>
          <span class="value" id="apiStatus">Cargando...</span>
        </div>
        <div class="info-row">
          <span class="label">Rama Git:</span>
          <span class="value" id="gitBranch">-</span>
        </div>
      </div>

      <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
      // Variables de entorno del contenedor
      const APP_NAME = 'colpruebas';
      const ENVIRONMENT = 'production'; // Esto se sobreescribirá desde el build
      
      // Detectar entorno desde la URL o variable
      const isTest = window.location.hostname.includes('8086') || window.location.port === '8086';
      const currentEnv = isTest ? 'test' : 'production';
      
      document.getElementById('appName').textContent = APP_NAME;
      
      const envElement = document.getElementById('environment');
      envElement.textContent = currentEnv === 'production' ? 'PRODUCCIÓN' : 'TEST';
      envElement.className = 'value ' + currentEnv;
      
      const frontendElement = document.getElementById('frontendStatus');
      if (currentEnv === 'production') {
        frontendElement.textContent = 'Estamos en el frontend de PRODUCCIÓN';
        frontendElement.className = 'value prod';
      } else {
        frontendElement.textContent = 'Estamos en el frontend de TEST';
        frontendElement.className = 'value test';
      }

      // Obtener Git branch
      const gitBranch = 'main'; // Valor por defecto
      document.getElementById('gitBranch').textContent = gitBranch;

      // Timestamp
      document.getElementById('timestamp').textContent = new Date().toISOString();

      // Llamar a la API para obtener información
      const apiUrl = isTest ? 'http://localhost:3006' : 'http://localhost:3005';
      
      fetch(apiUrl + '/')
        .then(res => res.json())
        .then(data => {
          const apiElement = document.getElementById('apiStatus');
          if (data.environment === 'production') {
            apiElement.textContent = 'API de producción funcionando';
            apiElement.className = 'value prod';
          } else {
            apiElement.textContent = 'API de test funcionando';
            apiElement.className = 'value test';
          }
        })
        .catch(err => {
          document.getElementById('apiStatus').textContent = 'Error conectando a API';
          document.getElementById('apiStatus').style.color = '#dc3545';
        });
    </script>
  </body>
</html>
